<!DOCTYPE html>
<html lang="pt-BR"> <!-- ou lang="en" para inglês -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <h2>Bem-vindo ao HTML</h2>
    <h3>Minha primeira página</h3>
    <h4>Subtítulo</h4>
    <h5>Subtítulo menor</h5>
    <h6>Subtítulo ainda menor</h6>
    
    <p>Esta é a minha primeira página HTML.</p>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <ol>
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
    </ol>


</body>

<!-- O que cada Estrutura faz:

<!DOCTYPE html>         — avisa ao navegador que é HTML5 (versão mais moderna do HTML)
<html lang="pt-BR">     — início do documento, define o idioma (lang="en" para inglês)
<head>                  — informações sobre a página que o usuário não vê (metadados)
<meta charset="UTF-8">  — suporta acentos e caracteres especiais
<meta name="viewport">  — faz a página funcionar bem no celular
<title>                 — o nome que aparece na aba do navegador
<body>                  — aqui vai tudo que o usuário vê na tela

-->

<!-- 
O lang só serve para o navegador e leitores de tela
saberem o idioma do conteúdo, ajuda na acessibilidade e no SEO.
  

SEO HTML refere-se à otimização das marcações de código 
de um site (HTML) para que mecanismos de busca como o Google
compreendam perfeitamente o conteúdo da página

Essa prática de SEO Técnico garante um melhor ranqueamento orgânico,
atraindo mais tráfego qualificado.

-->

</html>
